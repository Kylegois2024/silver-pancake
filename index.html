<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personnel Staffing Aus – Warehouse & Logistics Staffing</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1F3A; --navy-mid: #1A3456; --navy-light: #2A4F7A;
      --gold: #C8922A; --gold-light: #E8B84B; --gold-pale: #FDF5E6;
      --white: #FFFFFF; --off-white: #F7F9FC;
      --gray-light: #E8ECF2; --gray-mid: #9BACC0; --gray-dark: #4A5568; --text: #1A2332;
      --success: #1A7A4A; --success-bg: #E8F5EE;
      --error: #C0392B; --error-bg: #FDECEA;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(11,31,58,0.10); --shadow-lg: 0 12px 48px rgba(11,31,58,0.18);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav { background: var(--navy); padding: 0 48px; display: flex; align-items: center; justify-content: space-between; height: 72px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
    .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .logo-mark { width: 40px; height: 40px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
    .logo-text strong { display: block; font-size: 15px; font-weight: 700; color: var(--white); }
    .logo-text span { font-size: 11px; color: var(--gray-mid); letter-spacing: 0.06em; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 2px; }
    .nb { background: none; border: none; color: var(--gray-mid); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 8px 13px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .nb:hover { color: var(--white); background: rgba(255,255,255,0.08); }
    .nb.active { color: var(--white); }
    .nb.cta { background: var(--gold); color: var(--navy); font-weight: 700; margin-left: 8px; }
    .nb.cta:hover { background: var(--gold-light); color: var(--navy); }

    /* BUTTONS */
    .btn-p { background: var(--gold); color: var(--navy); border: none; border-radius: var(--radius); padding: 14px 30px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-p:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: var(--shadow); }
    .btn-o { background: transparent; color: var(--white); border: 2px solid rgba(255,255,255,0.3); border-radius: var(--radius); padding: 14px 30px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-o:hover { border-color: var(--white); }
    .btn-n { background: var(--navy); color: var(--white); border: none; border-radius: var(--radius-sm); padding: 12px 26px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-n:hover { background: var(--navy-light); transform: translateY(-1px); }
    .btn-sub { background: var(--gold); color: var(--navy); border: none; border-radius: var(--radius-sm); padding: 13px 30px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-sub:hover { background: var(--gold-light); }
    .btn-bk { background: none; border: 1.5px solid var(--gray-light); color: var(--gray-dark); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 11px 22px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; }
    .btn-bk:hover { border-color: var(--navy); color: var(--navy); }

    /* LAYOUT */
    .sec { padding: 88px 48px; }
    .inner { max-width: 1100px; margin: 0 auto; }
    .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .lbl-lt { color: var(--gold-light); }
    .h1 { font-family: 'Playfair Display', serif; font-size: clamp(30px, 4vw, 48px); color: var(--navy); line-height: 1.15; margin-bottom: 16px; }
    .h1-lt { color: var(--white); }
    .sub { font-size: 17px; color: var(--gray-dark); line-height: 1.8; max-width: 620px; }
    .sub-lt { color: rgba(255,255,255,0.6); }
    .divider { height: 1px; background: var(--gray-light); margin: 0 48px; }

    /* HERO */
    .hero { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1D3F72 100%); padding: 110px 48px 90px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; opacity: 0.03; background-image: repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%); background-size: 20px 20px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(200,146,42,0.15); border: 1px solid rgba(200,146,42,0.4); color: var(--gold-light); padding: 7px 18px; border-radius: 24px; font-size: 12px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 28px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(38px, 6vw, 66px); color: var(--white); line-height: 1.08; margin-bottom: 22px; max-width: 780px; margin-left: auto; margin-right: auto; }
    .hero h1 em { color: var(--gold-light); font-style: normal; }
    .hero p { font-size: 19px; color: rgba(255,255,255,0.62); max-width: 540px; margin: 0 auto 42px; line-height: 1.7; }
    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .hero-stats { display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; margin-top: 68px; padding-top: 44px; border-top: 1px solid rgba(255,255,255,0.1); }
    .hs-num { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700; color: var(--gold-light); line-height: 1; }
    .hs-lbl { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px; }

    /* TRUST */
    .trust { background: var(--white); border-bottom: 1px solid var(--gray-light); padding: 20px 48px; display: flex; align-items: center; justify-content: center; gap: 44px; flex-wrap: wrap; }
    .ti { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--gray-dark); }
    .tdot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

    /* CARDS */
    .cards3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 48px; }
    .card { background: var(--white); border: 1px solid var(--gray-light); border-radius: 16px; padding: 32px 26px; transition: all 0.25s; cursor: pointer; }
    .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--gold); }
    .card-icon { width: 50px; height: 50px; border-radius: 12px; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 20px; }
    .card h3 { font-size: 19px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
    .card p { font-size: 14px; color: var(--gray-dark); line-height: 1.7; }
    .card-link { display: inline-block; margin-top: 16px; font-size: 13px; font-weight: 700; color: var(--gold); }

    /* GRID 2COL */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }

    /* ABOUT */
    .about-vis { background: linear-gradient(135deg,var(--navy),var(--navy-light)); border-radius: 20px; height: 420px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .about-vis::before { content:''; position: absolute; inset:0; opacity:0.05; background-image: repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%); background-size:20px 20px; }
    .av-inner { text-align: center; position: relative; z-index: 1; }
    .av-year { font-family: 'Playfair Display', serif; font-size: 88px; font-weight: 800; color: var(--gold); line-height: 1; display: block; }
    .av-sub { font-size: 15px; color: rgba(255,255,255,0.55); letter-spacing: 0.04em; }
    .av-badge { position: absolute; bottom: -18px; right: -18px; background: var(--gold); border-radius: 14px; padding: 18px 22px; box-shadow: var(--shadow-lg); }
    .av-badge strong { display: block; font-size: 26px; font-weight: 800; color: var(--navy); }
    .av-badge span { font-size: 12px; color: var(--navy); font-weight: 600; opacity: 0.7; }
    .vals { display: flex; flex-direction: column; gap: 16px; margin-top: 28px; }
    .val { display: flex; gap: 13px; align-items: flex-start; }
    .val-check { width: 22px; height: 22px; border-radius: 50%; background: var(--success-bg); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; margin-top: 2px; color: var(--success); }
    .val strong { font-size: 14px; font-weight: 700; color: var(--navy); display: block; margin-bottom: 2px; }
    .val span { font-size: 13px; color: var(--gray-dark); line-height: 1.6; }

    /* TEAM */
    .team-card { background: var(--white); border: 1px solid var(--gray-light); border-radius: 16px; overflow: hidden; transition: all 0.2s; }
    .team-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .team-av { height: 160px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; }
    .team-info { padding: 20px 22px; }
    .team-info h4 { font-size: 16px; font-weight: 700; color: var(--navy); }
    .team-info .role { font-size: 13px; color: var(--gold); font-weight: 600; margin: 4px 0 8px; }
    .team-info p { font-size: 13px; color: var(--gray-dark); line-height: 1.6; }

    /* POLICE CHECK */
    .pc-hero { background: var(--navy); padding: 72px 48px; }
    .pc-hi { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
    .pc-hi h2 { font-family: 'Playfair Display', serif; font-size: clamp(28px,4vw,44px); color: var(--white); margin-bottom: 14px; }
    .pc-hi > div > p { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 26px; }
    .pc-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pc-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .pc-card { background: var(--white); border-radius: 16px; padding: 32px; box-shadow: var(--shadow-lg); }
    .pc-card h3 { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .pc-card > p { font-size: 14px; color: var(--gray-dark); margin-bottom: 22px; }
    .pc-steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .pc-step { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--gray-dark); }
    .pc-sn { width: 26px; height: 26px; border-radius: 50%; background: var(--navy); color: var(--gold); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* TABS */
    .tabs { background: var(--white); border-bottom: 1px solid var(--gray-light); padding: 0 48px; display: flex; }
    .tab-btn { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; padding: 17px 22px; cursor: pointer; color: var(--gray-mid); border-bottom: 3px solid transparent; transition: all 0.2s; }
    .tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); }
    .tab-btn:hover:not(.active) { color: var(--gray-dark); }

    /* FORM */
    .form-wrap { background: var(--white); border-radius: 16px; box-shadow: var(--shadow-lg); overflow: hidden; margin-top: 40px; }
    .form-hdr { background: var(--navy); padding: 26px 32px; display: flex; align-items: center; justify-content: space-between; }
    .form-hdr h3 { color: var(--white); font-size: 18px; font-weight: 700; }
    .form-hdr p { color: var(--gray-mid); font-size: 13px; margin-top: 3px; }
    .prog { display: flex; gap: 6px; }
    .prog-pip { height: 4px; width: 34px; border-radius: 2px; background: rgba(255,255,255,0.18); transition: background 0.3s; }
    .prog-pip.done { background: var(--gold); }
    .prog-pip.active { background: var(--gold-light); }
    .form-body { padding: 32px; }
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .fg-full { grid-column: 1 / -1; }
    .fgrp { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 13px; font-weight: 600; color: var(--navy); }
    label .req { color: var(--error); }
    input, select, textarea { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 14px; border: 1.5px solid var(--gray-light); border-radius: var(--radius-sm); background: var(--off-white); color: var(--text); transition: all 0.2s; outline: none; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--navy-light); background: var(--white); box-shadow: 0 0 0 3px rgba(42,79,122,0.1); }
    input.ferr-i { border-color: var(--error); }
    .ferr { font-size: 12px; color: var(--error); }
    textarea { resize: vertical; min-height: 80px; }
    .info-b { background: #EBF4FF; border: 1px solid #B8D4F4; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: #1A5FA3; margin-bottom: 22px; }
    .upload-z { border: 2px dashed var(--gray-light); border-radius: var(--radius); padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--off-white); }
    .upload-z:hover, .upload-z.drag { border-color: var(--navy-light); background: #EBF4FF; }
    .upload-z h4 { font-size: 15px; font-weight: 700; color: var(--navy); margin: 10px 0 5px; }
    .upload-z p { font-size: 13px; color: var(--gray-mid); }
    .upload-z input { display: none; }
    .up-file { display: flex; align-items: center; justify-content: space-between; background: var(--success-bg); border: 1px solid #B2DFCC; border-radius: var(--radius-sm); padding: 11px 14px; margin-top: 10px; }
    .up-file span { font-size: 13px; color: var(--success); font-weight: 500; }
    .up-rem { background: none; border: none; color: var(--error); cursor: pointer; font-size: 17px; }
    .consent-b { background: var(--gold-pale); border: 1px solid rgba(200,146,42,0.3); border-radius: var(--radius); padding: 22px; margin-top: 18px; }
    .consent-b h4 { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .consent-b > p { font-size: 13px; color: var(--gray-dark); line-height: 1.7; margin-bottom: 14px; }
    .chk-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .chk-row input[type=checkbox] { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--navy); flex-shrink: 0; }
    .chk-row label { font-size: 13px; font-weight: 400; color: var(--gray-dark); cursor: pointer; }
    .form-nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 32px; border-top: 1px solid var(--gray-light); background: var(--off-white); }

    /* STATUS */
    .status-search { background: var(--white); border: 1px solid var(--gray-light); border-radius: var(--radius); padding: 26px; display: flex; gap: 12px; align-items: flex-end; margin-top: 32px; }
    .status-res { background: var(--white); border: 1px solid var(--gray-light); border-radius: var(--radius); padding: 26px; margin-top: 18px; }
    .tl-item { display: flex; gap: 14px; margin-bottom: 22px; }
    .tl-dot { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; position: relative; }
    .tl-dot::after { content: ''; position: absolute; left: 50%; top: 100%; transform: translateX(-50%); width: 2px; height: 26px; background: var(--gray-light); }
    .tl-item:last-child .tl-dot::after { display: none; }
    .tl-dot.done { background: var(--success); }
    .tl-dot.active { background: var(--gold); box-shadow: 0 0 0 4px rgba(200,146,42,0.2); }
    .tl-dot.pend { background: var(--gray-light); }
    .tl-txt h4 { font-size: 14px; font-weight: 700; }
    .tl-txt p { font-size: 13px; color: var(--gray-mid); margin-top: 2px; }
    .sbadge { display: inline-block; padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .sbadge.complete { background: var(--success-bg); color: var(--success); }
    .sbadge.processing { background: #FFF3CD; color: #856404; }
    .sbadge.pending { background: var(--gray-light); color: var(--gray-dark); }

    /* ADMIN */
    .adm-bar { background: var(--navy); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .adm-bar h2 { color: var(--white); font-size: 18px; font-weight: 700; }
    .adm-bar span { color: var(--gray-mid); font-size: 13px; }
    .adm-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; padding: 24px 32px; }
    .stat-c { background: var(--white); border: 1px solid var(--gray-light); border-radius: var(--radius); padding: 20px; }
    .stat-c .sn { font-size: 28px; font-weight: 700; color: var(--navy); }
    .stat-c .sl { font-size: 13px; color: var(--gray-mid); margin-top: 3px; }
    .stat-c .sd { font-size: 12px; font-weight: 600; margin-top: 5px; color: var(--success); }
    .tbl-wrap { padding: 0 32px 32px; }
    .tbl-ctrl { display: flex; gap: 10px; margin-bottom: 12px; }
    .ts { flex: 1; max-width: 280px; padding: 9px 13px; border: 1.5px solid var(--gray-light); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
    .tf { padding: 9px 13px; border: 1.5px solid var(--gray-light); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--white); cursor: pointer; outline: none; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 13px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gray-mid); border-bottom: 2px solid var(--gray-light); background: var(--off-white); }
    td { padding: 12px 13px; border-bottom: 1px solid var(--gray-light); vertical-align: middle; }
    tr:hover td { background: #F0F4FA; }
    .abtn { background: none; border: 1px solid var(--gray-light); border-radius: 6px; padding: 5px 11px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--navy); transition: all 0.2s; }
    .abtn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }

    /* CONTACT */
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; margin-top: 48px; }
    .ci { display: flex; gap: 14px; align-items: flex-start; }
    .ci-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ci strong { display: block; font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .ci p { font-size: 13px; color: var(--gray-dark); line-height: 1.6; }
    .cf { background: var(--white); border: 1px solid var(--gray-light); border-radius: 16px; padding: 32px; }
    .cf h3 { font-size: 19px; font-weight: 700; color: var(--navy); margin-bottom: 22px; }

    /* SUCCESS */
    .success-sc { text-align: center; padding: 72px 40px; max-width: 500px; margin: 0 auto; }
    .s-icon { width: 76px; height: 76px; border-radius: 50%; background: var(--success-bg); border: 3px solid var(--success); display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 22px; }
    .success-sc h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--navy); margin-bottom: 12px; }
    .success-sc p { color: var(--gray-dark); font-size: 15px; line-height: 1.7; margin-bottom: 8px; }
    .ref-b { background: var(--gold-pale); border: 1px solid rgba(200,146,42,0.3); border-radius: var(--radius); padding: 18px; margin: 22px 0; }
    .ref-b span { font-size: 11px; color: var(--gray-mid); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .ref-b strong { font-size: 21px; color: var(--navy); font-family: monospace; letter-spacing: 0.1em; }

    /* FOOTER */
    footer { background: var(--navy); padding: 60px 48px 26px; }
    .ft-inner { max-width: 1100px; margin: 0 auto; }
    .ft-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 44px; margin-bottom: 44px; }
    .ft-brand p { font-size: 13px; color: var(--gray-mid); line-height: 1.7; margin-top: 10px; max-width: 240px; }
    .ft-col h4 { font-size: 12px; font-weight: 700; color: var(--white); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 14px; }
    .ft-col a { display: block; font-size: 13px; color: var(--gray-mid); text-decoration: none; margin-bottom: 9px; cursor: pointer; transition: color 0.2s; }
    .ft-col a:hover { color: var(--gold-light); }
    .ft-bottom { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .ft-bottom p { font-size: 12px; color: var(--gray-mid); }
    .ft-badges { display: flex; gap: 8px; }

const SUPA_URL = 'https://hcwbseetqgowwvdvdpkz.supabase.co';
const SUPA_KEY = 'sb_publishable_Ufcq-xVZy0peHjwE6ZOHFg_B_JCy_kY';
const sb = {
  async insert(table, data) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method:'POST', headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Prefer':'return=representation'},
      body: JSON.stringify(data)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async select(table, query='') {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${query}&order=created_at.desc`, {
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async update(table, match, data) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${match}`, {
      method:'PATCH', headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Prefer':'return=representation'},
      body: JSON.stringify(data)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async uploadFile(bucket, path, file) {
    const r = await fetch(`${SUPA_URL}/storage/v1/object/${bucket}/${path}`, {
      method:'POST', headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':file.type},
      body: file
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  fileUrl(bucket, path) {
    return `${SUPA_URL}/storage/v1/object/authenticated/${bucket}/${path}`;
  }
};

/* ── APPLICATION FORM ── */
function AppForm({ setPage }) {
  const [step,setStep]=useState(0);
  const [done,setDone]=useState(false);
  const [submittedRef,setSubmittedRef]=useState('');
  const [submitting,setSubmitting]=useState(false);
  const [submitErr,setSubmitErr]=useState('');
  const [files,setFiles]=useState({primary:null,secondary:null});
  const [drag,setDrag]=useState({primary:false,secondary:false});
  const [form,setForm]=useState({firstName:'',lastName:'',dob:'',email:'',phone:'',gender:'',address:'',suburb:'',state:'',postcode:'',prevAddress:'',site:'',startDate:'',c1:false,c2:false,c3:false});
  const [errs,setErrs]=useState({});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  const validate=()=>{
    const e={};
    if(step===0){if(!form.firstName.trim())e.firstName='Required';if(!form.lastName.trim())e.lastName='Required';if(!form.dob)e.dob='Required';if(!form.email.includes('@'))e.email='Valid email required';if(!form.phone.trim())e.phone='Required';}
    if(step===1){if(!form.address.trim())e.address='Required';if(!form.suburb.trim())e.suburb='Required';if(!form.state)e.state='Required';if(!form.postcode.trim())e.postcode='Required';}
    if(step===2){if(!files.primary)e.primary='Primary ID required';if(!files.secondary)e.secondary='Secondary ID required';}
    if(step===3){if(!form.c1||!form.c2||!form.c3)e.consent='All declarations required';}
    setErrs(e);return Object.keys(e).length===0;
  };
  const next=()=>{if(validate())setStep(s=>s+1);};
  const back=()=>setStep(s=>s-1);
  const handleFile=(key,file)=>{if(file)setFiles(f=>({...f,[key]:file}));};

  const submit = async () => {
    if(!validate()) return;
    setSubmitting(true);
    setSubmitErr('');
    try {
      const reference = genRef();
      // Upload ID documents to Supabase Storage
      const uploadFile = async (file, label) => {
        const ext = file.name.split('.').pop();
        const path = `${reference}/${label}.${ext}`;
        await sb.uploadFile('id-documents', path, file);
        return path;
      };
      const primaryPath = await uploadFile(files.primary, 'primary-id');
      const secondaryPath = await uploadFile(files.secondary, 'secondary-id');

      // Insert application record into database
      await sb.insert('applications', {
        first_name: form.firstName,
        last_name: form.lastName,
        dob: form.dob,
        email: form.email,
        phone: form.phone,
        gender: form.gender,
        address: form.address,
        suburb: form.suburb,
        state: form.state,
        postcode: form.postcode,
        prev_address: form.prevAddress,
        site: form.site,
        start_date: form.startDate,
        reference,
        status: 'pending',
        primary_id_path: primaryPath,
        secondary_id_path: secondaryPath,
      });

      setSubmittedRef(reference);
      setDone(true);
    } catch(err) {
      console.error(err);
      setSubmitErr('Something went wrong submitting your application. Please try again or contact us on 0434 681 471.');
    } finally {
      setSubmitting(false);
    }
  };

  const stepLabels=['Personal Details','Address & Work','Upload ID','Consent & Submit'];

  if(done) return (
    <div className="success-sc">
      <div className="s-icon">✓</div>
      <h2>Application Submitted!</h2>
      <p>Your police check application has been received and is now being processed.</p>
      <p style={{marginTop:4}}>Once complete, contact us to confirm at <strong>kyle@personnelstaffingaus.com</strong>.</p>
      <div className="ref-b"><span>Your Reference Number</span><strong>{submittedRef}</strong></div>
      <p style={{fontSize:13,color:'var(--gray-mid)',marginBottom:24}}>Save this number to track your application. Results within 1–2 business days.</p>
      <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn-n" onClick={()=>{setDone(false);setStep(0);setFiles({primary:null,secondary:null});setForm({firstName:'',lastName:'',dob:'',email:'',phone:'',gender:'',address:'',suburb:'',state:'',postcode:'',prevAddress:'',site:'',startDate:'',c1:false,c2:false,c3:false});}}>New Application</button>
        <button className="btn-bk" onClick={()=>setPage('home')}>Return Home</button>
      </div>
    </div>
  );

  return (
    <div className="form-wrap">
      <div className="form-hdr">
        <div><h3>Step {step+1} of {stepLabels.length}: {stepLabels[step]}</h3><p>Secured and encrypted. Compliant with the Australian Privacy Act 1988.</p></div>
        <div className="prog">{stepLabels.map((_,i)=><div key={i} className={`prog-pip${i<step?' done':i===step?' active':''}`}/>)}</div>
      </div>
      <div className="form-body">
        {step===0 && <>
          <div className="info-b">ℹ️ Enter details exactly as they appear on your government-issued ID.</div>
          <div className="fg">
            {[['firstName','First Name'],['lastName','Last Name']].map(([k,l])=>(
              <div className="fgrp" key={k}><label>{l} <span className="req">*</span></label><input value={form[k]} onChange={e=>upd(k,e.target.value)} className={errs[k]?'ferr-i':''}/>{errs[k]&&<span className="ferr">{errs[k]}</span>}</div>
            ))}
            <div className="fgrp"><label>Date of Birth <span className="req">*</span></label><input type="date" value={form.dob} onChange={e=>upd('dob',e.target.value)} className={errs.dob?'ferr-i':''}/>{errs.dob&&<span className="ferr">{errs.dob}</span>}</div>
            <div className="fgrp"><label>Gender</label><select value={form.gender} onChange={e=>upd('gender',e.target.value)}><option value="">Prefer not to say</option>{['Male','Female','Non-binary','Other'].map(g=><option key={g}>{g}</option>)}</select></div>
            <div className="fgrp"><label>Email <span className="req">*</span></label><input type="email" value={form.email} onChange={e=>upd('email',e.target.value)} className={errs.email?'ferr-i':''} placeholder="your@email.com"/>{errs.email&&<span className="ferr">{errs.email}</span>}</div>
            <div className="fgrp"><label>Mobile <span className="req">*</span></label><input type="tel" value={form.phone} onChange={e=>upd('phone',e.target.value)} className={errs.phone?'ferr-i':''} placeholder="04XX XXX XXX"/>{errs.phone&&<span className="ferr">{errs.phone}</span>}</div>
          </div>
        </>}
        {step===1 && <>
          <div className="info-b">ℹ️ Provide your current address. Include any previous address if you've moved in the last 5 years.</div>
          <div className="fg">
            <div className="fgrp fg-full"><label>Street Address <span className="req">*</span></label><input value={form.address} onChange={e=>upd('address',e.target.value)} className={errs.address?'ferr-i':''} placeholder="Street number and name"/>{errs.address&&<span className="ferr">{errs.address}</span>}</div>
            <div className="fgrp"><label>Suburb <span className="req">*</span></label><input value={form.suburb} onChange={e=>upd('suburb',e.target.value)} className={errs.suburb?'ferr-i':''}/>{errs.suburb&&<span className="ferr">{errs.suburb}</span>}</div>
            <div className="fgrp"><label>State <span className="req">*</span></label><select value={form.state} onChange={e=>upd('state',e.target.value)} className={errs.state?'ferr-i':''}><option value="">Select</option>{['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'].map(s=><option key={s}>{s}</option>)}</select>{errs.state&&<span className="ferr">{errs.state}</span>}</div>
            <div className="fgrp"><label>Postcode <span className="req">*</span></label><input value={form.postcode} onChange={e=>upd('postcode',e.target.value)} className={errs.postcode?'ferr-i':''} maxLength={4} placeholder="e.g. 2000"/>{errs.postcode&&<span className="ferr">{errs.postcode}</span>}</div>
            <div className="fgrp fg-full"><label>Previous Address (if moved in last 5 years)</label><input value={form.prevAddress} onChange={e=>upd('prevAddress',e.target.value)} placeholder="Street, suburb, state, postcode"/></div>
            <div className="fgrp"><label>Assigned Warehouse Site</label><select value={form.site} onChange={e=>upd('site',e.target.value)}><option value="">Select site</option>{['Blacktown DC','Wetherill Park','Eastern Creek','Yennora','Erskine Park','Moorebank','Laverton North','Dandenong South','Wacol','Brendale','Wingfield','Bibra Lake'].map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="fgrp"><label>Expected Start Date</label><input type="date" value={form.startDate} onChange={e=>upd('startDate',e.target.value)}/></div>
          </div>
        </>}
        {step===2 && <>
          <div className="info-b">ℹ️ You need a primary ID (passport or driver's licence) and a secondary ID (Medicare card, birth certificate, or utility bill).</div>
          {['primary','secondary'].map(key=>(
            <div className="fgrp" key={key} style={{marginBottom:18}}>
              <label style={{marginBottom:7}}>{key==='primary'?'Primary ID':'Secondary ID'} <span className="req">*</span> <span style={{fontWeight:400,color:'var(--gray-mid)',marginLeft:6}}>{key==='primary'?"(Passport or Driver's Licence)":"(Medicare, Birth Certificate, or Utility Bill)"}</span></label>
              {files[key]
                ? <div className="up-file"><span>✓ {files[key].name} ({(files[key].size/1024/1024).toFixed(1)}MB)</span><button className="up-rem" onClick={()=>setFiles(f=>({...f,[key]:null}))}>×</button></div>
                : <div className={`upload-z${drag[key]?' drag':''}`} onDragOver={e=>{e.preventDefault();setDrag(d=>({...d,[key]:true}));}} onDragLeave={()=>setDrag(d=>({...d,[key]:false}))} onDrop={e=>{e.preventDefault();handleFile(key,e.dataTransfer.files[0]);setDrag(d=>({...d,[key]:false}));}} onClick={()=>document.getElementById(`f-${key}`).click()}>
                  <div style={{fontSize:30}}>📎</div><h4>Drop file here or click to browse</h4><p>PDF, JPG, PNG — max 10MB</p>
                  <input type="file" id={`f-${key}`} accept=".pdf,.jpg,.jpeg,.png" onChange={e=>handleFile(key,e.target.files[0])}/>
                </div>
              }
              {errs[key]&&<span className="ferr">{errs[key]}</span>}
            </div>
          ))}
        </>}
        {step===3 && <>
          <div className="info-b">ℹ️ Please review your details and agree to all declarations before submitting.</div>
          <div style={{background:'var(--off-white)',border:'1px solid var(--gray-light)',borderRadius:'var(--radius)',padding:18,marginBottom:18}}>
            <h4 style={{fontWeight:700,marginBottom:10,fontSize:14}}>Application Summary</h4>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px 22px',fontSize:14}}>
              <span style={{color:'var(--gray-mid)'}}>Name</span><strong>{form.firstName} {form.lastName}</strong>
              <span style={{color:'var(--gray-mid)'}}>DOB</span><strong>{form.dob}</strong>
              <span style={{color:'var(--gray-mid)'}}>Email</span><strong>{form.email}</strong>
              <span style={{color:'var(--gray-mid)'}}>Site</span><strong>{form.site||'Not specified'}</strong>
              <span style={{color:'var(--gray-mid)'}}>Primary ID</span><strong>{files.primary?.name||'—'}</strong>
              <span style={{color:'var(--gray-mid)'}}>Secondary ID</span><strong>{files.secondary?.name||'—'}</strong>
            </div>
          </div>
          <div className="consent-b">
            <h4>Consent &amp; Declaration</h4>
            <p>By submitting, you consent to Personnel Staffing Aus conducting a National Police Check in accordance with ACIC requirements and the Privacy Act 1988 (Cth).</p>
            {[['c1','I confirm all information provided is true and correct to the best of my knowledge.'],['c2','I consent to Personnel Staffing Aus collecting, using, and disclosing my personal information for the purpose of conducting a National Police Check as outlined in the Privacy Policy.'],['c3','I understand results may be shared with my prospective employer as authorised under the Privacy Act 1988.']].map(([k,t])=>(
              <div className="chk-row" key={k}><input type="checkbox" id={k} checked={form[k]} onChange={e=>upd(k,e.target.checked)}/><label htmlFor={k}>{t}</label></div>
            ))}
            {errs.consent&&<span className="ferr" style={{display:'block',marginTop:8}}>{errs.consent}</span>}
          </div>
          {submitErr&&<div style={{background:'var(--error-bg)',border:'1px solid #F5C6CB',borderRadius:'var(--radius-sm)',padding:14,marginTop:16,color:'var(--error)',fontSize:13}}>{submitErr}</div>}
        </>}
      </div>
      <div className="form-nav">
        {step>0?<button className="btn-bk" onClick={back} disabled={submitting}>← Back</button>:<span/>}
        {step<3
          ?<button className="btn-n" onClick={next}>Continue →</button>
          :<button className="btn-sub" onClick={submit} disabled={submitting} style={{opacity:submitting?0.7:1}}>
            {submitting?'Uploading & Submitting…':'Submit Application ✓'}
          </button>
        }
      </div>
    </div>
  );
}

/* ── TRACKER ── */
function Tracker() {
  const [q,setQ]=useState('');
  const [res,setRes]=useState(null);
  const [nf,setNf]=useState(false);
  const [loading,setLoading]=useState(false);

  const search = async () => {
    if(!q.trim()) return;
    setLoading(true); setNf(false); setRes(null);
    try {
      const data = await sb.select('applications', `reference=eq.${q.trim().toUpperCase()}&select=*`);
      if(data && data.length>0) { setRes(data[0]); setNf(false); }
      else setNf(true);
    } catch(e) { setNf(true); }
    finally { setLoading(false); }
  };

  const tl=(status)=>[
    {l:'Application Received',d:'Your application and ID documents have been received.',s:'done'},
    {l:'Identity Verified',d:'Your ID documents are being checked.',s:status==='pending'?'pend':'done'},
    {l:'Check in Progress',d:'Your check is being processed with the ACIC database.',s:status==='complete'?'done':status==='processing'?'active':'pend'},
    {l:'Results Ready',d:'Your National Police Certificate has been issued.',s:status==='complete'?'done':'pend'},
  ];

  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-AU') : '—';

  return (
    <div style={{maxWidth:620}}>
      <h3 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:8}}>Track Your Application</h3>
      <p style={{color:'var(--gray-dark)',fontSize:14,marginBottom:22}}>Enter your reference number to check your live application status.</p>
      <div className="status-search">
        <div className="fgrp" style={{flex:1}}><label>Reference Number</label><input value={q} onChange={e=>setQ(e.target.value)} placeholder="e.g. PSA-2025-0901" onKeyDown={e=>e.key==='Enter'&&search()}/></div>
        <button className="btn-n" onClick={search} disabled={loading}>{loading?'Searching…':'Search'}</button>
      </div>
      {nf&&<div style={{background:'var(--error-bg)',border:'1px solid #F5C6CB',borderRadius:'var(--radius)',padding:18,marginTop:18,color:'var(--error)',fontSize:14}}>No application found with that reference number. Please check and try again.</div>}
      {res&&(
        <div className="status-res">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>
            <div>
              <h3 style={{fontSize:18,fontWeight:700,color:'var(--navy)'}}>{res.first_name} {res.last_name}</h3>
              <p style={{fontSize:13,color:'var(--gray-mid)',marginTop:3}}>Ref: {res.reference} · Submitted {fmtDate(res.created_at)} · {res.site||'No site'}</p>
            </div>
            <span className={`sbadge ${res.status}`}>{res.status==='complete'?'Complete':res.status==='processing'?'In Progress':'Pending'}</span>
          </div>
          {tl(res.status).map((t,i)=>(
            <div className="tl-item" key={i}>
              <div className={`tl-dot ${t.s}`}/>
              <div className="tl-txt"><h4 style={{color:t.s==='pend'?'var(--gray-mid)':'var(--navy)'}}>{t.l}</h4><p>{t.d}</p></div>
            </div>
          ))}
          {res.status==='complete'&&<div style={{background:'var(--success-bg)',border:'1px solid #B2DFCC',borderRadius:'var(--radius)',padding:14,marginTop:10}}><strong style={{color:'var(--success)',fontSize:13}}>✓ Your National Police Certificate has been issued. Contact Kyle on 0434 681 471 to receive your copy.</strong></div>}
        </div>
      )}
    </div>
  );
}

/* ── ADMIN ── */
function AdminDash() {
  const [li,setLi]=useState(false);
  const [pw,setPw]=useState('');
  const [pwe,setPwe]=useState(false);
  const [sq,setSq]=useState('');
  const [sf,setSf]=useState('all');
  const [apps,setApps]=useState([]);
  const [loading,setLoading]=useState(false);
  const [selected,setSelected]=useState(null);
  const [updating,setUpdating]=useState(false);

  const loadApps = async () => {
    setLoading(true);
    try {
      const data = await sb.select('applications','select=*');
      setApps(data||[]);
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  const updateStatus = async (id, status) => {
    setUpdating(true);
    try {
      await sb.update('applications', `id=eq.${id}`, {status});
      setApps(prev=>prev.map(a=>a.id===id?{...a,status}:a));
      if(selected?.id===id) setSelected(s=>({...s,status}));
    } catch(e) { alert('Failed to update status.'); }
    finally { setUpdating(false); }
  };

  const getDocUrl = (path) => sb.fileUrl('id-documents', path);
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-AU') : '—';

  if(!li) return (
    <div style={{maxWidth:360}}>
      <h3 style={{fontSize:19,fontWeight:700,color:'var(--navy)',marginBottom:6}}>Admin Login</h3>
      <p style={{fontSize:14,color:'var(--gray-dark)',marginBottom:22}}>Staff access only.</p>
      <div className="fgrp" style={{marginBottom:14}}>
        <label>Password</label>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwe(false);}} className={pwe?'ferr-i':''} placeholder="Admin password"
          onKeyDown={e=>e.key==='Enter'&&(pw==='PSA-admin-2025'?[setLi(true),loadApps()]:setPwe(true))}/>
        {pwe&&<span className="ferr">Incorrect password</span>}
      </div>
      <button className="btn-n" style={{width:'100%'}} onClick={()=>pw==='PSA-admin-2025'?[setLi(true),loadApps()]:setPwe(true)}>Login →</button>
    </div>
  );

  const filtered=apps.filter(a=>{
    const mq=(a.first_name+' '+a.last_name).toLowerCase().includes(sq.toLowerCase())||a.reference?.toLowerCase().includes(sq.toLowerCase());
    const mf=sf==='all'||a.status===sf;
    return mq&&mf;
  });
  const cnt={total:apps.length,complete:apps.filter(a=>a.status==='complete').length,processing:apps.filter(a=>a.status==='processing').length,pending:apps.filter(a=>a.status==='pending').length};

  return (
    <div style={{background:'var(--white)',border:'1px solid var(--gray-light)',borderRadius:16,overflow:'hidden'}}>
      {selected && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'var(--white)',borderRadius:16,padding:32,maxWidth:560,width:'100%',maxHeight:'80vh',overflowY:'auto',position:'relative'}}>
            <button onClick={()=>setSelected(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--gray-mid)'}}>×</button>
            <h3 style={{fontSize:19,fontWeight:700,color:'var(--navy)',marginBottom:4}}>{selected.first_name} {selected.last_name}</h3>
            <p style={{fontSize:13,color:'var(--gray-mid)',marginBottom:20}}>Ref: {selected.reference} · Submitted {fmtDate(selected.created_at)}</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 20px',fontSize:14,marginBottom:20}}>
              {[['DOB',selected.dob],['Email',selected.email],['Phone',selected.phone],['Gender',selected.gender||'Not specified'],['Address',`${selected.address}, ${selected.suburb} ${selected.state} ${selected.postcode}`],['Site',selected.site||'Not specified'],['Start Date',selected.start_date||'Not specified']].map(([l,v])=>(
                <React.Fragment key={l}><span style={{color:'var(--gray-mid)',fontWeight:600}}>{l}</span><span>{v}</span></React.Fragment>
              ))}
            </div>
            <div style={{borderTop:'1px solid var(--gray-light)',paddingTop:16,marginBottom:16}}>
              <h4 style={{fontSize:13,fontWeight:700,color:'var(--navy)',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.05em'}}>ID Documents</h4>
              {[['Primary ID',selected.primary_id_path],['Secondary ID',selected.secondary_id_path]].map(([l,path])=>(
                path ? <div key={l} style={{marginBottom:8}}><a href={getDocUrl(path)} target="_blank" rel="noopener noreferrer" style={{color:'var(--navy-light)',fontWeight:600,fontSize:14}}>📄 View {l}</a></div>
                : <div key={l} style={{fontSize:14,color:'var(--gray-mid)',marginBottom:8}}>{l}: Not uploaded</div>
              ))}
            </div>
            <div style={{borderTop:'1px solid var(--gray-light)',paddingTop:16}}>
              <h4 style={{fontSize:13,fontWeight:700,color:'var(--navy)',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.05em'}}>Update Status</h4>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                {['pending','processing','complete'].map(s=>(
                  <button key={s} onClick={()=>updateStatus(selected.id,s)} disabled={updating||selected.status===s}
                    style={{padding:'9px 18px',borderRadius:8,border:'none',fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,cursor:'pointer',
                      background:selected.status===s?'var(--navy)':'var(--off-white)',
                      color:selected.status===s?'var(--white)':'var(--gray-dark)',
                      opacity:updating?0.6:1}}>
                    {s==='pending'?'Pending':s==='processing'?'In Progress':'Complete'}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="adm-bar">
        <div><h2>Admin Dashboard</h2><span>Police Check Management · {cnt.total} applications</span></div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn-bk" style={{borderColor:'rgba(255,255,255,0.2)',color:'var(--gray-mid)',fontSize:13}} onClick={loadApps}>↻ Refresh</button>
          <button className="btn-bk" style={{borderColor:'rgba(255,255,255,0.2)',color:'var(--gray-mid)',fontSize:13}} onClick={()=>setLi(false)}>Logout</button>
        </div>
      </div>
      <div className="adm-stats">
        <div className="stat-c"><div className="sn">{cnt.total}</div><div className="sl">Total Applications</div></div>
        <div className="stat-c"><div className="sn" style={{color:'var(--success)'}}>{cnt.complete}</div><div className="sl">Completed</div></div>
        <div className="stat-c"><div className="sn" style={{color:'#856404'}}>{cnt.processing}</div><div className="sl">In Progress</div></div>
        <div className="stat-c"><div className="sn" style={{color:'var(--gray-dark)'}}>{cnt.pending}</div><div className="sl">Pending Review</div></div>
      </div>
      <div className="tbl-wrap">
        <div className="tbl-ctrl">
          <input className="ts" placeholder="Search name or reference..." value={sq} onChange={e=>setSq(e.target.value)}/>
          <select className="tf" value={sf} onChange={e=>setSf(e.target.value)}><option value="all">All Statuses</option><option value="complete">Complete</option><option value="processing">In Progress</option><option value="pending">Pending</option></select>
        </div>
        {loading
          ? <div style={{textAlign:'center',padding:40,color:'var(--gray-mid)'}}>Loading applications…</div>
          : <div style={{border:'1px solid var(--gray-light)',borderRadius:'var(--radius)',overflow:'auto'}}>
              <table>
                <thead><tr><th>Applicant</th><th>Reference</th><th>Site</th><th>Submitted</th><th>Status</th><th></th></tr></thead>
                <tbody>
                  {filtered.map(a=>(
                    <tr key={a.id}>
                      <td><div style={{fontWeight:700,color:'var(--navy)'}}>{a.first_name} {a.last_name}</div><div style={{fontSize:12,color:'var(--gray-mid)'}}>{a.email}</div></td>
                      <td><span style={{fontFamily:'monospace',fontSize:12,color:'var(--gray-mid)'}}>{a.reference}</span></td>
                      <td style={{fontSize:13}}>{a.site||'—'}</td>
                      <td style={{fontSize:13}}>{fmtDate(a.created_at)}</td>
                      <td><span className={`sbadge ${a.status}`}>{a.status==='complete'?'Complete':a.status==='processing'?'In Progress':'Pending'}</span></td>
                      <td><button className="abtn" onClick={()=>setSelected(a)}>View</button></td>
                    </tr>
                  ))}
                  {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:'center',padding:28,color:'var(--gray-mid)'}}>No results found.</td></tr>}
                </tbody>
              </table>
            </div>
        }
      </div>
    </div>
  );
}

            <div style={{background:'var(--gold-pale)',border:'1px solid rgba(200,146,42,0.3)',borderRadius:'var(--radius)',padding:20}}>
              <strong style={{color:'var(--navy)',display:'block',marginBottom:7,fontSize:14}}>Employers — Request Workers</strong>
              <p style={{fontSize:13,color:'var(--gray-dark)',lineHeight:1.7}}>Need warehouse staff fast? Call us directly on 0434 681 471 or email kyle@personnelstaffingaus.com for same-day response.</p>
            </div>
          </div>
          <div className="cf">
            <h3>Send Us a Message</h3>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div className="fgrp"><label>Full Name</label><input value={form.name} onChange={e=>upd('name',e.target.value)} placeholder="Your name"/></div>
              <div className="fgrp"><label>Email</label><input type="email" value={form.email} onChange={e=>upd('email',e.target.value)} placeholder="your@email.com"/></div>
              <div className="fgrp"><label>Company (optional)</label><input value={form.company} onChange={e=>upd('company',e.target.value)} placeholder="Your company name"/></div>
              <div className="fgrp"><label>Enquiry Type</label><select value={form.type} onChange={e=>upd('type',e.target.value)}><option value="">Select type</option><option>Labour Hire — I need warehouse workers</option><option>Police Check — I need more information</option><option>Compliance — workforce compliance help</option><option>General Enquiry</option></select></div>
              <div className="fgrp"><label>Message</label><textarea value={form.message} onChange={e=>upd('message',e.target.value)} placeholder="How can we help?" rows={4}/></div>
              <button className="btn-n" style={{width:'100%'}} onClick={()=>setSent(true)}>Send Message →</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </>);
}

/* ── FOOTER ── */
function Footer({ setPage }) {
  return (
    <footer>
      <div className="ft-inner">
        <div className="ft-grid">
          <div className="ft-brand">
            <div className="logo" style={{marginBottom:10}}>
              <div className="logo-mark" style={{width:36,height:36,fontSize:13}}>SS</div>
              <div className="logo-text"><strong>Personnel Staffing Aus</strong></div>
            </div>
            <p>Australia's specialist warehouse and logistics staffing partner. Founded in Sydney in 2024. Serving businesses across all major Australian cities.</p>
          </div>
          <div className="ft-col"><h4>Company</h4><a onClick={()=>setPage('about')}>About Us</a><a onClick={()=>setPage('services')}>Our Services</a><a onClick={()=>setPage('contact')}>Contact</a></div>
          <div className="ft-col"><h4>Police Checks</h4><a onClick={()=>setPage('police')}>Apply Online</a><a onClick={()=>setPage('police')}>Track Application</a><a>Privacy Policy</a><a>Terms of Service</a></div>
          <div className="ft-col"><h4>Contact</h4><a>kyle@personnelstaffingaus.com</a><a>0434 681 471</a><a>161 Castlereagh St, Sydney NSW 2000</a><a>Mon–Fri 8am–5pm AEST</a></div>
        </div>
        <div className="ft-bottom">
          <p>© 2025 Personnel Staffing Aus Pty Ltd · ABN XX XXX XXX XXX · Founded Sydney 2024</p>
          <div className="ft-badges">
            <span className="ft-badge">ACIC Accredited</span>
            <span className="ft-badge">Privacy Act Compliant</span>
            <span className="ft-badge">Fair Work Compliant</span>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ── APP ── */
function App() {
  const [page,setPage]=useState('home');
  const pages={home:Home,about:About,services:Services,police:Police,contact:Contact};
  const Page=pages[page]||Home;
  return (<><Nav page={page} setPage={setPage}/><Page setPage={setPage}/><Footer setPage={setPage}/></>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
